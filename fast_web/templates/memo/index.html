<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>메모 목록</title></head>
<body>
    <h1>메모 목록</h1>
    <a href="/notes/new">새 메모 작성</a>
    <ul>
        {% for note in notes %}
            <li>
                <a href="/notes/{{ note.id }}">{{ note.title }}</a>
            </li>
        {% else %} <!-- 반복할 데이터가 없을때 수행 -->
            <li>작성된 메모가 없습니다.</li>
        {% endfor %}
    </ul>
</body>
</html>
